  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#f6f1df;color:#171717} header{background:#101010;color:white;padding:22px;text-align:center}.wrap{max-width:1000px;margin:auto;padding:22px}.card{background:white;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:18px} input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-top:6px} textarea{min-height:72px;resize:vertical} button{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700}.primary{background:#111;color:white}.secondary{background:#eee;color:#111}.danger{background:#ffe3e3;color:#a40014}.ok{background:#e4f8e9;color:#147a32}.row{display:grid;grid-template-columns:1fr 120px 130px;gap:10px;align-items:end}.item{border:1px solid #eee;border-radius:14px;padding:14px;margin:12px 0;background:#fafafa}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.section-title input{font-size:20px;font-weight:700}.muted{color:#666;font-size:13px}.status{font-weight:700;margin:10px 0}#admin{display:none}#login{max-width:430px;margin:70px auto}@media(max-width:720px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><h1>MenuScan Admin — Paris&#x27;s Café &amp; Restaurant</h1><div class="muted">RESTO_ID : paris-cafe</div></header>
<div id="login" class="card"><h2>Connexion admin</h2><p class="muted">Mot de passe : paris2026</p><input id="password" type="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') login()" /><div class="actions"><button class="primary" onclick="login()">Se connecter</button></div><p id="loginMsg" class="status"></p></div>
<main id="admin" class="wrap"><div class="card"><h2>Informations</h2><label>Nom du restaurant</label><input id="restaurantName" oninput="MENU.restaurant=this.value; MENU.name=this.value" /><div class="actions"><button class="primary" onclick="publishMenu()">Publier sur Firebase</button><button class="secondary" onclick="addSection()">Ajouter une section</button><button class="secondary" onclick="loadMenu()">Recharger depuis Firebase</button></div><p id="status" class="status"></p></div><div id="sections"></div></main>
<script>

function login(){ const p=document.getElementById('password').value; if(p!==ADMIN_PASSWORD){document.getElementById('loginMsg').textContent='Mot de passe incorrect';return;} document.getElementById('login').style.display='none'; document.getElementById('admin').style.display='block'; loadMenu(); }
async function loadMenu(){ const status=document.getElementById('status'); status.textContent='Chargement...'; try{ const snap=await db.collection('menus').doc(RESTO_ID).get(); if(snap.exists){ MENU=snap.data(); } MENU.name = MENU.name || MENU.restaurant || ''; MENU.restaurant = MENU.restaurant || MENU.name || ''; document.getElementById('restaurantName').value=MENU.restaurant || MENU.name || ''; render(); status.textContent=snap.exists ? 'Menu chargé depuis Firebase.' : 'Menu prérempli prêt à publier.'; }catch(e){ document.getElementById('restaurantName').value=MENU.restaurant || MENU.name || ''; render(); status.textContent='Erreur Firebase : '+e.message; } }
function render(){ const root=document.getElementById('sections'); root.innerHTML=''; MENU.sections=MENU.sections||[]; MENU.sections.forEach((section,si)=>{ section.items=section.items||[]; const card=document.createElement('div'); card.className='card'; card.innerHTML=`<div class="section-title"><input value="${escapeAttr(section.name||'')}" oninput="MENU.sections[${si}].name=this.value" /></div><div id="items-${si}"></div><div class="actions"><button class="secondary" onclick="addItem(${si})">Ajouter un plat</button><button class="danger" onclick="deleteSection(${si})">Supprimer la section</button></div>`; root.appendChild(card); const itemsRoot=card.querySelector('#items-'+si); section.items.forEach((item,ii)=>{ const div=document.createElement('div'); div.className='item'; div.innerHTML=`<div class="row"><div><label>Nom</label><input value="${escapeAttr(item.name||'')}" oninput="MENU.sections[${si}].items[${ii}].name=this.value" /></div><div><label>Prix</label><input value="${escapeAttr(item.price||'')}" oninput="MENU.sections[${si}].items[${ii}].price=this.value" /></div><div><label>Disponibilité</label><button class="${item.available?'ok':'danger'}" onclick="toggleAvailable(${si},${ii})">${item.available?'Disponible':'Indispo'}</button></div></div><label>Description</label><textarea oninput="MENU.sections[${si}].items[${ii}].desc=this.value">${escapeHtml(item.desc||'')}</textarea><div class="actions"><button class="danger" onclick="deleteItem(${si},${ii})">Supprimer</button></div>`; itemsRoot.appendChild(div); }); }); }
function addSection(){ MENU.sections.push({name:'Nouvelle section',items:[]}); render(); }
function deleteSection(si){ if(confirm('Supprimer cette section ?')){ MENU.sections.splice(si,1); render(); } }
function addItem(si){ MENU.sections[si].items.push({name:'Nouveau plat',desc:'',price:'',available:true}); render(); }
function deleteItem(si,ii){ MENU.sections[si].items.splice(ii,1); render(); }
function toggleAvailable(si,ii){ MENU.sections[si].items[ii].available=!MENU.sections[si].items[ii].available; render(); }
function escapeHtml(str){ return String(str).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }
async function publishMenu(){ const status=document.getElementById('status'); status.textContent='Publication...'; try{ MENU.name = MENU.name || MENU.restaurant; MENU.restaurant = MENU.restaurant || MENU.name; await db.collection('menus').doc(RESTO_ID).set(MENU); status.textContent='Menu publié avec succès ✅'; }catch(e){ status.textContent='Erreur publication Firebase : '+e.message; } }
</script></body></html>
