
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Concordia Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf8f4;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid #e8e0d5;border-radius:20px;padding:48px 36px;max-width:380px;width:100%;text-align:center}
.card h1{font-family:'Playfair Display',serif;font-size:26px;color:#b83a1a;margin-bottom:4px}
.card .sub{font-size:13px;color:#9a8878;margin-bottom:32px}
.field{margin-bottom:14px;text-align:left}
.field label{font-size:12px;color:#9a8878;display:block;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input{width:100%;background:#faf8f4;border:1px solid #e8e0d5;border-radius:10px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#b83a1a}
.err{font-size:12px;color:#b83a1a;margin-bottom:12px;display:none;background:#fdf0f0;border:1px solid #f0c8c8;border-radius:8px;padding:8px 12px}
.btn-login{width:100%;background:#b83a1a;color:#fff;border:none;padding:14px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-login:hover{background:#9a2e12}
.hint{font-size:11px;color:#b8a898;margin-top:20px;line-height:1.6}

/* TOPBAR */
#admin{display:none}
.topbar{background:#fff;border-bottom:1px solid #e8e0d5;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:12px}
.topbar h2{font-family:'Playfair Display',serif;font-size:18px;color:#b83a1a}
.topbar p{font-size:11px;color:#9a8878;margin-top:1px}
.pub-btn{background:#b83a1a;color:#fff;border:none;padding:11px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;flex-shrink:0}
.pub-btn:hover{background:#9a2e12}
.pub-btn:disabled{opacity:.5;cursor:not-allowed;background:#9a8878}

/* CONTENT */
.wrap{max-width:680px;margin:0 auto;padding:24px 16px}
.status{background:#fff;border:1px solid #e8e0d5;border-radius:12px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:#7a6a5a;display:flex;align-items:center;gap:10px;transition:all .3s}
.status.ok{border-color:#6abf85;background:#f0faf4;color:#2d7a4a}
.status.ko{border-color:#f0a0a0;background:#fdf0f0;color:#b83a1a}
.dot{width:8px;height:8px;border-radius:50%;background:#d4c8bc;flex-shrink:0}
.status.ok .dot{background:#6abf85}
.status.ko .dot{background:#e86a5a}

/* SECTION */
.sec{margin-bottom:24px;background:#fff;border:1px solid #e8e0d5;border-radius:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:14px 18px;background:#fdf8f6;border-bottom:1px solid #f0e8e0}
.sec-title-input{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:#b83a1a;background:transparent;border:none;outline:none;flex:1;min-width:0}
.sec-title-input:focus{border-bottom:1px solid #e8d5c8}
.sec-del{background:transparent;border:1px solid #e8d5c8;color:#c0a898;font-size:12px;padding:4px 10px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
.sec-del:hover{background:#fdf0f0;border-color:#e8a0a0;color:#b83a1a}
.sec-add{background:transparent;border:1px solid #d4e8d4;color:#6abf85;font-size:12px;padding:4px 10px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
.sec-add:hover{background:#f0faf4}

/* ITEM ROW */
.row{border-bottom:1px solid #f5f0eb;padding:12px 18px;display:flex;align-items:flex-start;gap:12px;transition:background .15s}
.row:last-child{border-bottom:none}
.row.off{background:#fdfaf8}
.row-fields{flex:1;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.row-name{font-family:'DM Sans',sans-serif;font-size:14px;color:#2a2118;background:transparent;border:none;outline:none;width:100%;padding:4px 0;border-bottom:1px solid transparent;transition:border-color .2s}
.row-name:focus{border-bottom-color:#e8d5c8}
.row.off .row-name{text-decoration:line-through;color:#9a8878}
.row-desc{font-size:12px;color:#9a8878;background:transparent;border:none;outline:none;width:100%;padding:3px 0;border-bottom:1px solid transparent;transition:border-color .2s;resize:none;font-family:'DM Sans',sans-serif;line-height:1.4}
.row-desc:focus{border-bottom-color:#e8d5c8;color:#7a6a5a}
.row-price{font-size:13px;color:#b83a1a;font-weight:500;background:transparent;border:1px solid #f0d8d0;border-radius:8px;padding:5px 10px;outline:none;width:72px;font-family:'DM Sans',sans-serif;text-align:center;transition:border-color .2s}
.row-price:focus{border-color:#b83a1a}
.row-right{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.row-del{background:transparent;border:none;color:#d4c8bc;cursor:pointer;font-size:16px;padding:2px;transition:color .15s;line-height:1}
.row-del:hover{color:#b83a1a}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:#d4c8bc;border-radius:11px;cursor:pointer;transition:.2s}
.tsl::after{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.tog input:checked+.tsl{background:#6abf85}
.tog input:checked+.tsl::after{transform:translateX(18px)}

/* ADD SECTION */
.add-sec-btn{width:100%;background:transparent;border:1.5px dashed #e8d5c8;border-radius:12px;padding:14px;color:#b8a898;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-bottom:24px}
.add-sec-btn:hover{border-color:#b83a1a;color:#b83a1a;background:#fdf8f6}

@media(max-width:500px){
  .topbar{padding:12px 16px}
  .row-fields{grid-template-columns:1fr}
  .row-price{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h1>Concordia</h1>
    <div class="sub">Administration du menu</div>
    <div class="err" id="err"></div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')document.getElementById('tok').focus()">
    </div>
    <div class="field">
      <label>Token GitHub</label>
      <input type="password" id="tok" placeholder="ghp_..." onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">Connexion</button>
    <div class="hint">Le token n'est jamais stocké dans le code.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="topbar">
    <div>
      <h2>Concordia Restaurant</h2>
      <p id="last-pub">Aucune publication</p>
    </div>
    <button class="pub-btn" id="pub-btn" onclick="publish()">
      <span id="pub-icon">✓</span>
      <span id="pub-txt">Publier</span>
    </button>
  </div>
  <div class="wrap">
    <div class="status" id="status">
      <div class="dot"></div>
      <span id="stxt">Modifiez le menu puis cliquez Publier pour mettre le site à jour.</span>
    </div>
    <div id="sections"></div>
    <button class="add-sec-btn" onclick="addSection()">+ Ajouter une section</button>
  </div>
</div>

<script>
var PWD = 'concordia2024';
var TOKEN = '';
var OWNER = 'nadamaa1', REPO = 'menu', FILE = 'index.html';

var MENU = {
  name: 'Concordia Restaurant',
  sections: [
    { title: 'Entrées', items: [
      { name: 'Salade de chèvre chaud', desc: 'Toasts de chèvre fondant sur lit de roquette, noix caramélisées, miel de fleurs et vinaigrette balsamique.', price: '9€', available: true },
      { name: 'Tartare de saumon frais', desc: 'Dés de saumon mariné aux agrumes, avocat crémeux, touche de ciboulette, accompagné de blinis croustillants.', price: '11€', available: true },
    ]},
    { title: 'Plats', items: [
      { name: 'Entrecôte grillée, sauce au poivre', desc: 'Entrecôte de bœuf maturée, frites maison, sauce au poivre crémeuse.', price: '24€', available: true },
      { name: 'Magret de canard aux figues', desc: "Magret rôti, réduction de vin rouge, figues confites, écrasé de pommes de terre à la truffe.", price: '19€', available: true },
      { name: 'Risotto aux champignons sauvages', desc: "Risotto crémeux, champignons forestiers, parmesan fraîchement râpé et persil.", price: '17€', available: true },
    ]},
    { title: 'Desserts', items: [
      { name: 'Tarte tatin maison', desc: 'Pommes caramélisées, pâte feuilletée, boule de glace vanille.', price: '6€', available: true },
      { name: 'Café gourmand', desc: 'Mini-desserts maison : macaron, financier, mousse chocolat, sorbet citron, espresso.', price: '7€', available: true },
    ]},
  ]
};

/* ── LOGIN ── */
function login() {
  var p=document.getElementById('pwd').value;
  var t=document.getElementById('tok').value.trim();
  var err=document.getElementById('err');
  if(p!==PWD){err.textContent='Mot de passe incorrect';err.style.display='block';return;}
  if(!t.startsWith('ghp_')&&!t.startsWith('github_pat_')){err.textContent='Token GitHub invalide';err.style.display='block';return;}
  TOKEN=t;
  document.getElementById('login').style.display='none';
  document.getElementById('admin').style.display='block';
  render();
}

/* ── RENDER ── */
function render() {
  var c=document.getElementById('sections'); c.innerHTML='';
  MENU.sections.forEach(function(s,si){
    var div=document.createElement('div'); div.className='sec';
    div.innerHTML=
      '<div class="sec-head">'+
        '<input class="sec-title-input" value="'+esc(s.title)+'" placeholder="Nom de la section" oninput="MENU.sections['+si+'].title=this.value">'+
        '<button class="sec-add" onclick="addItem('+si+')">+ Plat</button>'+
        '<button class="sec-del" onclick="delSection('+si+')">Supprimer</button>'+
      '</div>'+
      '<div id="items-'+si+'">'+
        s.items.map(function(it,ii){return rowHTML(si,ii,it);}).join('')+
      '</div>';
    c.appendChild(div);
  });
}

function rowHTML(si,ii,it){
  return '<div class="row'+(it.available?'':' off')+'" id="row-'+si+'-'+ii+'">'+
    '<div class="row-fields">'+
      '<input class="row-name" value="'+esc(it.name)+'" placeholder="Nom du plat" oninput="MENU.sections['+si+'].items['+ii+'].name=this.value">'+
      '<input class="row-price" value="'+esc(it.price)+'" placeholder="Prix" oninput="MENU.sections['+si+'].items['+ii+'].price=this.value">'+
      '<input class="row-desc" value="'+esc(it.desc)+'" placeholder="Description" oninput="MENU.sections['+si+'].items['+ii+'].desc=this.value">'+
    '</div>'+
    '<div class="row-right">'+
      '<button class="row-del" onclick="delItem('+si+','+ii+')" title="Supprimer">✕</button>'+
      '<label class="tog"><input type="checkbox"'+(it.available?' checked':'')+' onchange="toggleItem('+si+','+ii+',this.checked)"><span class="tsl"></span></label>'+
    '</div>'+
  '</div>';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function toggleItem(si,ii,val){
  MENU.sections[si].items[ii].available=val;
  document.getElementById('row-'+si+'-'+ii).className='row'+(val?'':' off');
}
function delItem(si,ii){MENU.sections[si].items.splice(ii,1);render();}
function addItem(si){MENU.sections[si].items.push({name:'',desc:'',price:'',available:true});render();}
function delSection(si){if(confirm('Supprimer cette section ?')){MENU.sections.splice(si,1);render();}}
function addSection(){MENU.sections.push({title:'Nouvelle section',items:[]});render();}

/* ── BUILD HTML ── */
function buildHTML(){
  var d=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var body=MENU.sections.map(function(s){
    return '<div class="section"><div class="section-title">'+s.title+'</div>'+
      s.items.map(function(it){
        return '<div class="item'+(it.available?'':' off')+'">'+
          '<div class="item-left">'+
            '<div class="item-name">'+it.name+'</div>'+
            '<div class="item-desc">'+it.desc+'</div>'+
            (it.available?'':'<div class="badge-off">Indisponible aujourd\'hui</div>')+
          '</div>'+
          '<div class="item-right"><div class="item-price">'+it.price+'</div></div>'+
        '</div>';
      }).join('')+'</div>';
  }).join('');
  return '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Concordia Restaurant</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#faf8f4;color:#2a2118;font-family:\'DM Sans\',sans-serif;font-weight:300;min-height:100vh}.page{max-width:560px;margin:0 auto;padding:48px 28px 80px}.header{text-align:center;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid #e8e0d5}.header h1{font-family:\'Playfair Display\',serif;font-size:36px;font-weight:600;color:#b83a1a;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}.header p{font-size:13px;color:#9a8878;letter-spacing:.04em}.section{margin-bottom:40px}.section-title{font-family:\'Playfair Display\',serif;font-size:28px;font-style:italic;color:#b83a1a;margin-bottom:24px;padding-bottom:10px;border-bottom:1px solid #e8d5c8}.item{display:flex;align-items:flex-start;gap:12px;padding:16px 0;border-bottom:1px solid #f0ece6}.item:last-child{border-bottom:none}.item.off{opacity:.4}.item-left{flex:1}.item-name{font-family:\'Playfair Display\',serif;font-size:18px;font-weight:400;color:#2a2118;margin-bottom:5px;line-height:1.3}.item.off .item-name{text-decoration:line-through;color:#9a8878}.item-desc{font-size:13px;color:#7a6a5a;line-height:1.6;font-style:italic}.item-right{flex-shrink:0;text-align:right;padding-top:2px}.item-price{font-family:\'Playfair Display\',serif;font-size:18px;color:#b83a1a}.badge-off{display:inline-block;font-size:10px;background:#f5ede8;color:#b83a1a;border:1px solid #e8c8bc;padding:2px 8px;border-radius:100px;margin-top:6px}.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid #e8e0d5;font-size:12px;color:#b8a898}</style></head><body><div class="page"><div class="header"><h1>Concordia Restaurant</h1><p>Menu du '+d+'</p></div>'+body+'<div class="footer">Concordia Restaurant &nbsp;·&nbsp; '+d+'</div></div></body></html>';
}

/* ── PUBLISH ── */
async function publish(){
  var btn=document.getElementById('pub-btn');
  var icon=document.getElementById('pub-icon');
  var txt=document.getElementById('pub-txt');
  var st=document.getElementById('status');
  var stxt=document.getElementById('stxt');
  btn.disabled=true; icon.textContent='⏳'; txt.textContent='Publication…';
  st.className='status'; stxt.textContent='Envoi en cours…';
  try{
    var r1=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+FILE,{
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    if(!r1.ok) throw new Error('Erreur GitHub '+r1.status+' — token invalide ou expiré');
    var d1=await r1.json();
    var html=buildHTML();
    var enc=btoa(unescape(encodeURIComponent(html)));
    var r2=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+FILE,{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Mise à jour menu',content:enc,sha:d1.sha})
    });
    if(!r2.ok) throw new Error('Erreur GitHub '+r2.status);
    st.className='status ok'; stxt.textContent='✓ Menu publié ! Visible dans ~30 secondes.';
    document.getElementById('last-pub').textContent='Publié à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    st.className='status ko'; stxt.textContent='✗ '+e.message;
  }
  btn.disabled=false; icon.textContent='✓'; txt.textContent='Publier';
}
</script>
</body>
</html>
