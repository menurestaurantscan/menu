
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f4ee;color:#2a2118;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
.page{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.header{text-align:center;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid #ddd5c0}
.header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:#3d2b1a;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.header p{font-size:13px;color:#8a7a6a}
.loading{text-align:center;padding:80px 0;color:#8a7a6a;font-size:14px}
.error{text-align:center;padding:80px 0;color:#b83a1a;font-size:14px}
.section{margin-bottom:40px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#3d2b1a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #3d2b1a}
.item{display:flex;align-items:baseline;gap:8px;padding:10px 0;border-bottom:1px solid #ece5d8}
.item:last-child{border-bottom:none}
.item.off{opacity:.35}
.item-left{flex:1}
.item-name{font-size:15px;color:#2a2118;margin-bottom:2px}
.item.off .item-name{text-decoration:line-through;color:#9a8878}
.item-desc{font-size:12px;color:#8a7a6a;font-style:italic;margin-top:2px}
.dots{flex:1;border-bottom:1px dotted #c8b89a;min-width:12px;position:relative;top:-4px}
.item-price{font-size:15px;color:#3d2b1a;font-weight:500;white-space:nowrap;flex-shrink:0}
.badge-off{display:inline-block;font-size:10px;background:#f5ede8;color:#b83a1a;border:1px solid #e8c8bc;padding:2px 8px;border-radius:100px;margin-top:4px}
.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid #ddd5c0;font-size:12px;color:#b8a898}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1 id="resto-name">Chargement…</h1>
    <p id="resto-date"></p>
  </div>
  <div id="menu-body"><div class="loading">Chargement du menu…</div></div>
  <div class="footer" id="footer"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDuqkUJ_pEr4n-RbbP8rCnJWz-tBwMeBns",
  authDomain: "menuscan-a0ead.firebaseapp.com",
  projectId: "menuscan-a0ead",
  appId: "1:865935761009:web:1c161538574d297b0745d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get restaurant ID from URL ?id=xxx
const params = new URLSearchParams(location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('menu-body').innerHTML = '<div class="error">Lien invalide — identifiant manquant.</div>';
} else {
  try {
    const snap = await getDoc(doc(db, 'menus', id));
    if (!snap.exists()) {
      document.getElementById('menu-body').innerHTML = '<div class="error">Menu introuvable.</div>';
    } else {
      const data = snap.data();
      const d = new Date().toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
      document.title = data.name || 'Menu';
      document.getElementById('resto-name').textContent = data.name || 'Menu';
      document.getElementById('resto-date').textContent = 'Menu du ' + d;
      document.getElementById('footer').textContent = (data.name || '') + ' · ' + d;
      document.getElementById('menu-body').innerHTML = (data.sections || []).map(s => `
        <div class="section">
          <div class="section-title">${h(s.title)}</div>
          ${(s.items || []).map(it => `
            <div class="item${it.available===false?' off':''}">
              <div class="item-left">
                <div class="item-name">${h(it.name)}</div>
                ${it.desc ? `<div class="item-desc">${h(it.desc)}</div>` : ''}
                ${it.available===false ? '<div class="badge-off">Indisponible</div>' : ''}
              </div>
              ${it.price ? `<div class="dots"></div><div class="item-price">${h(it.price)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }
  } catch(e) {
    document.getElementById('menu-body').innerHTML = '<div class="error">Erreur : ' + e.message + '</div>';
  }
}

function h(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
