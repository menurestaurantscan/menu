<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Nölke Zahida</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --text: #e8e4dc;
    --muted: #777;
    --danger: #c0392b;
    --success: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 40%, #1a1508 0%, #0d0d0d 70%);
  }
  .login-box {
    text-align: center; width: 360px;
    padding: 60px 40px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .login-box h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2rem; letter-spacing: .2em; color: var(--gold); margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 40px; }
  .login-box input {
    width: 100%; padding: 14px 16px; background: transparent;
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Jost', sans-serif; font-size: .95rem; letter-spacing: .05em;
    outline: none; margin-bottom: 16px;
    transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--gold); }
  .login-box button {
    width: 100%; padding: 14px; background: var(--gold); color: #0d0d0d;
    border: none; font-family: 'Jost', sans-serif; font-size: .85rem;
    font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: var(--gold-light); }
  #login-error { color: #e74c3c; font-size: .82rem; margin-top: 12px; letter-spacing: .05em; }

  /* ADMIN */
  #admin-screen { display: none; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .header-title h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; color: var(--gold); letter-spacing: .1em; }
  .header-title span { font-size: .72rem; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  #status-msg { font-size: .8rem; color: var(--success); letter-spacing: .05em; opacity: 0; transition: opacity .4s; }
  #status-msg.show { opacity: 1; }
  .btn-publish {
    padding: 12px 28px; background: var(--gold); color: #0d0d0d;
    border: none; font-family: 'Jost', sans-serif; font-size: .8rem;
    font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .btn-publish:hover { background: var(--gold-light); }
  .btn-add-section {
    padding: 12px 20px; background: transparent; color: var(--gold);
    border: 1px solid var(--gold); font-family: 'Jost', sans-serif;
    font-size: .78rem; font-weight: 400; letter-spacing: .15em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .btn-add-section:hover { background: var(--gold); color: #0d0d0d; }

  main { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  .section-block {
    margin-bottom: 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: #1c1c1c;
  }
  .section-name-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--gold); font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 600; letter-spacing: .12em;
    outline: none; text-transform: uppercase; width: 260px;
    transition: border-color .2s;
  }
  .section-name-input:focus { border-bottom-color: var(--gold); }
  .section-actions { display: flex; gap: 10px; }
  .btn-add-item, .btn-del-section {
    padding: 7px 14px; font-family: 'Jost', sans-serif;
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; border: 1px solid; transition: all .2s;
  }
  .btn-add-item { border-color: var(--gold); color: var(--gold); background: transparent; }
  .btn-add-item:hover { background: var(--gold); color: #0d0d0d; }
  .btn-del-section { border-color: #444; color: #666; background: transparent; }
  .btn-del-section:hover { border-color: var(--danger); color: var(--danger); }

  .items-list { padding: 8px 0; }
  .item-row {
    display: grid; grid-template-columns: 1fr 1.8fr 90px 44px;
    gap: 12px; align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #1a1a1a; }
  .item-row.unavailable { opacity: .45; }
  .field-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text); font-family: 'Jost', sans-serif; font-size: .88rem;
    outline: none; width: 100%; padding: 4px 2px;
    transition: border-color .2s;
  }
  .field-input:focus { border-bottom-color: var(--gold); }
  .price-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--gold); font-family: 'Jost', sans-serif; font-size: .88rem;
    outline: none; width: 100%; padding: 4px 2px; text-align: right;
    transition: border-color .2s;
  }
  .price-input:focus { border-bottom-color: var(--gold); }
  .item-controls { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }

  /* Toggle */
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #333; border-radius: 20px;
    transition: background .25s;
  }
  .toggle input:checked + .toggle-track { background: var(--gold); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; background: #888; border-radius: 50%;
    transition: left .25s, background .25s;
  }
  .toggle input:checked ~ .toggle-thumb { left: 19px; background: #0d0d0d; }

  .btn-del-item {
    background: transparent; border: none; color: #444;
    cursor: pointer; font-size: 1rem; line-height: 1;
    transition: color .2s; padding: 4px;
  }
  .btn-del-item:hover { color: var(--danger); }

  .empty-section { padding: 24px; text-align: center; color: var(--muted); font-size: .82rem; letter-spacing: .1em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Nölke Zahida</h1>
    <p>Administration du menu</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Accéder</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-title">
      <h2>Nölke Zahida</h2>
      <span>Gestion du menu</span>
    </div>
    <div class="header-actions">
      <span id="status-msg">✓ Publié avec succès</span>
      <button class="btn-add-section" onclick="addSection()">+ Section</button>
      <button class="btn-publish" onclick="publishMenu()">Publier</button>
    </div>
  </header>
  <main id="menu-editor"></main>
</div>

<script>
const RESTO_ID = 'nolke-zahida';
const PASSWORD = 'nolke2024';

const firebaseConfig = {
  apiKey: "AIzaSyDuqkUJ_pEr4n-RbbP8rCnJWz-tBwMeBns",
  authDomain: "menuscan-a0ead.firebaseapp.com",
  projectId: "menuscan-a0ead",
  appId: "1:865935761009:web:1c161538574d297b0745d0"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var MENU = { name: "Nölke Zahida", sections: [] };

function doLogin() {
  var v = document.getElementById('pwd-input').value;
  if (v === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadMenu();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect';
  }
}

function loadMenu() {
  db.collection('menus').doc(RESTO_ID).get().then(function(doc) {
    if (doc.exists) {
      MENU = doc.data();
    } else {
      MENU = {
        name: "Nölke Zahida",
        sections: [
          {
            name: "Main Course",
            items: [
              { name: "Black Paper", desc: "", price: "$27", available: true },
              { name: "Roasted Beef", desc: "", price: "$27", available: true },
              { name: "Spaghetti", desc: "", price: "$28", available: true },
              { name: "Wagyu Steak", desc: "", price: "$28", available: true },
              { name: "Chicken Rise", desc: "", price: "$22", available: true },
              { name: "Tender Rice", desc: "", price: "$22", available: true }
            ]
          },
          {
            name: "Appetizer",
            items: [
              { name: "French Fries", desc: "", price: "$12", available: true },
              { name: "Humburger", desc: "", price: "$14", available: true },
              { name: "Mini Burger", desc: "", price: "$12", available: true },
              { name: "Hotdog", desc: "", price: "$14", available: true },
              { name: "Mini Hotdog", desc: "", price: "$12", available: true },
              { name: "Pop Corn", desc: "", price: "$12", available: true }
            ]
          }
        ]
      };
    }
    renderMenu();
  });
}

function renderMenu() {
  var editor = document.getElementById('menu-editor');
  editor.innerHTML = '';
  MENU.sections.forEach(function(section, si) {
    var block = document.createElement('div');
    block.className = 'section-block';
    var itemsHtml = '';
    if (section.items.length === 0) {
      itemsHtml = '<div class="empty-section">Aucun plat — cliquez sur + Plat</div>';
    } else {
      section.items.forEach(function(item, ii) {
        itemsHtml += '<div class="item-row' + (item.available ? '' : ' unavailable') + '" id="row-' + si + '-' + ii + '">' +
          '<input class="field-input" value="' + esc(item.name) + '" placeholder="Nom du plat" oninput="MENU.sections[' + si + '].items[' + ii + '].name=this.value">' +
          '<input class="field-input" value="' + esc(item.desc) + '" placeholder="Description (optionnel)" oninput="MENU.sections[' + si + '].items[' + ii + '].desc=this.value">' +
          '<input class="price-input" value="' + esc(item.price) + '" placeholder="$00" oninput="MENU.sections[' + si + '].items[' + ii + '].price=this.value">' +
          '<div class="item-controls">' +
            '<label class="toggle" title="Disponible">' +
              '<input type="checkbox"' + (item.available ? ' checked' : '') + ' onchange="toggleItem(' + si + ',' + ii + ',this.checked)">' +
              '<div class="toggle-track"></div>' +
              '<div class="toggle-thumb"></div>' +
            '</label>' +
            '<button class="btn-del-item" onclick="deleteItem(' + si + ',' + ii + ')" title="Supprimer">✕</button>' +
          '</div>' +
        '</div>';
      });
    }
    block.innerHTML =
      '<div class="section-header">' +
        '<input class="section-name-input" value="' + esc(section.name) + '" oninput="MENU.sections[' + si + '].name=this.value">' +
        '<div class="section-actions">' +
          '<button class="btn-add-item" onclick="addItem(' + si + ')">+ Plat</button>' +
          '<button class="btn-del-section" onclick="deleteSection(' + si + ')">Supprimer</button>' +
        '</div>' +
      '</div>' +
      '<div class="items-list">' + itemsHtml + '</div>';
    editor.appendChild(block);
  });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function toggleItem(si, ii, val) {
  MENU.sections[si].items[ii].available = val;
  var row = document.getElementById('row-' + si + '-' + ii);
  if (row) row.className = 'item-row' + (val ? '' : ' unavailable');
}

function addItem(si) {
  MENU.sections[si].items.push({ name: "", desc: "", price: "", available: true });
  renderMenu();
}

function deleteItem(si, ii) {
  MENU.sections[si].items.splice(ii, 1);
  renderMenu();
}

function addSection() {
  MENU.sections.push({ name: "Nouvelle section", items: [] });
  renderMenu();
}

function deleteSection(si) {
  if (confirm('Supprimer cette section et tous ses plats ?')) {
    MENU.sections.splice(si, 1);
    renderMenu();
  }
}

function publishMenu() {
  db.collection('menus').doc(RESTO_ID).set(MENU).then(function() {
    var msg = document.getElementById('status-msg');
    msg.classList.add('show');
    setTimeout(function() { msg.classList.remove('show'); }, 3000);
  }).catch(function(e) {
    alert('Erreur : ' + e.message);
  });
}
</script>
</body>
</html>
