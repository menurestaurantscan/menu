<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Paucek and Lage</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: #e2ddd8;
    --accent: #2c5f2e;
    --accent-light: #4a8c4d;
    --text: #1a1a1a;
    --muted: #888;
    --danger: #c0392b;
    --success: #2c5f2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: #f7f5f2;
  }
  .login-box {
    text-align: center; width: 380px;
    padding: 60px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 4px 40px rgba(0,0,0,.06);
  }
  .login-box h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.8rem; letter-spacing: .04em; color: var(--text); margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: .78rem; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 36px; }
  .login-box input {
    width: 100%; padding: 13px 16px; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .9rem;
    outline: none; margin-bottom: 14px;
    transition: border-color .2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 13px; background: var(--accent); color: #fff;
    border: none; font-family: 'DM Sans', sans-serif; font-size: .82rem;
    font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: var(--accent-light); }
  #login-error { color: #c0392b; font-size: .8rem; margin-top: 10px; }

  /* ADMIN */
  #admin-screen { display: none; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  .header-title h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; color: var(--text); }
  .header-title span { font-size: .7rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  #status-msg { font-size: .78rem; color: var(--success); letter-spacing: .04em; opacity: 0; transition: opacity .4s; }
  #status-msg.show { opacity: 1; }
  .btn-publish {
    padding: 11px 26px; background: var(--accent); color: #fff;
    border: none; font-family: 'DM Sans', sans-serif; font-size: .78rem;
    font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
    cursor: pointer; transition: background .2s;
  }
  .btn-publish:hover { background: var(--accent-light); }
  .btn-add-section {
    padding: 11px 18px; background: transparent; color: var(--accent);
    border: 1px solid var(--accent); font-family: 'DM Sans', sans-serif;
    font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .btn-add-section:hover { background: var(--accent); color: #fff; }

  main { max-width: 920px; margin: 0 auto; padding: 40px 24px 80px; }

  .section-block {
    margin-bottom: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    box-shadow: 0 2px 16px rgba(0,0,0,.03);
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: #faf9f7;
  }
  .section-name-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text); font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 600; letter-spacing: .04em;
    outline: none; width: 260px;
    transition: border-color .2s;
  }
  .section-name-input:focus { border-bottom-color: var(--accent); }
  .section-actions { display: flex; gap: 10px; }
  .btn-add-item, .btn-del-section {
    padding: 7px 14px; font-family: 'DM Sans', sans-serif;
    font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; border: 1px solid; transition: all .2s;
  }
  .btn-add-item { border-color: var(--accent); color: var(--accent); background: transparent; }
  .btn-add-item:hover { background: var(--accent); color: #fff; }
  .btn-del-section { border-color: #ccc; color: #aaa; background: transparent; }
  .btn-del-section:hover { border-color: var(--danger); color: var(--danger); }

  .items-list { padding: 4px 0; }
  .item-row {
    display: grid; grid-template-columns: 1fr 2fr 90px 44px;
    gap: 12px; align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid #f0ece7;
    transition: background .15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #faf9f7; }
  .item-row.unavailable { opacity: .4; }

  .field-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .88rem;
    outline: none; width: 100%; padding: 4px 2px;
    transition: border-color .2s;
  }
  .field-input:focus { border-bottom-color: var(--accent); }
  .price-input {
    background: transparent; border: none; border-bottom: 1px solid transparent;
    color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500;
    outline: none; width: 100%; padding: 4px 2px; text-align: right;
    transition: border-color .2s;
  }
  .price-input:focus { border-bottom-color: var(--accent); }
  .item-controls { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }

  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #ddd; border-radius: 20px;
    transition: background .25s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; background: #aaa; border-radius: 50%;
    transition: left .25s, background .25s;
  }
  .toggle input:checked ~ .toggle-thumb { left: 19px; background: #fff; }

  .btn-del-item {
    background: transparent; border: none; color: #ccc;
    cursor: pointer; font-size: 1rem; line-height: 1;
    transition: color .2s; padding: 4px;
  }
  .btn-del-item:hover { color: var(--danger); }
  .empty-section { padding: 24px; text-align: center; color: var(--muted); font-size: .82rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Paucek and Lage</h1>
    <p>Administration du menu</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Accéder</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-title">
      <h2>Paucek and Lage</h2>
      <span>Gestion du menu</span>
    </div>
    <div class="header-actions">
      <span id="status-msg">✓ Publié avec succès</span>
      <button class="btn-add-section" onclick="addSection()">+ Section</button>
      <button class="btn-publish" onclick="publishMenu()">Publier</button>
    </div>
  </header>
  <main id="menu-editor"></main>
</div>

<script>
const RESTO_ID = 'paucek-and-lage';
const PASSWORD = 'paucek2024';

const firebaseConfig = {
  apiKey: "AIzaSyDuqkUJ_pEr4n-RbbP8rCnJWz-tBwMeBns",
  authDomain: "menuscan-a0ead.firebaseapp.com",
  projectId: "menuscan-a0ead",
  appId: "1:865935761009:web:1c161538574d297b0745d0"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var MENU = { name: "Paucek and Lage", sections: [] };

function doLogin() {
  var v = document.getElementById('pwd-input').value;
  if (v === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadMenu();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect';
  }
}

function loadMenu() {
  db.collection('menus').doc(RESTO_ID).get().then(function(doc) {
    if (doc.exists) {
      MENU = doc.data();
    } else {
      MENU = {
        name: "Paucek and Lage",
        sections: [
          {
            name: "Main Course",
            items: [
              { name: "Grilled Salmon", desc: "Fresh salmon fillet seasoned with herbs, roasted vegetables, lemon-butter sauce", price: "$18.99", available: true },
              { name: "Vegetable Pad Thai", desc: "Stir-fried rice noodles, fresh vegetables, tofu, bean sprouts, peanuts, tamarind sauce", price: "$13.99", available: true },
              { name: "Mushroom Risotto", desc: "Creamy rice, mushrooms, garlic, shallots, Parmesan, truffle oil, fresh parsley", price: "$14.99", available: true },
              { name: "Grilled Chicken", desc: "Chicken breast, crisp lettuce, dressing, shaved cheese, garlic croutons, cherry tomatoes", price: "$12.99", available: true },
              { name: "Classic Beef", desc: "Tomato sauce, ground beef, lasagna noodles, béchamel, melted mozzarella", price: "$16.99", available: true },
              { name: "Eggplant Parmesan", desc: "Breaded eggplant, marinara sauce, mozzarella, Parmesan, spaghetti marinara", price: "$15.99", available: true }
            ]
          },
          {
            name: "Beverage",
            items: [
              { name: "Classic Margarita", desc: "", price: "$3.99", available: true },
              { name: "Mango Mocktail", desc: "", price: "$2.99", available: true },
              { name: "Iced Caramel Macchiato", desc: "", price: "$4.99", available: true },
              { name: "Green Tea Frappuccino", desc: "", price: "$3.99", available: true },
              { name: "Pineapple Coconut Smoothie", desc: "", price: "$5.99", available: true },
              { name: "Raspberry Mojito", desc: "", price: "$3.99", available: true },
              { name: "Blackberry Ginger Sparkler", desc: "", price: "$2.99", available: true }
            ]
          },
          {
            name: "Dessert",
            items: [
              { name: "Chocolate Mousse", desc: "", price: "$5.99", available: true },
              { name: "Apple Pie", desc: "", price: "$7.99", available: true },
              { name: "Strawberry Shortcake", desc: "", price: "$6.99", available: true },
              { name: "Fruit Tart", desc: "", price: "$5.99", available: true },
              { name: "Tiramisu", desc: "", price: "$8.99", available: true },
              { name: "Chocolate Lava Cake", desc: "", price: "$6.99", available: true },
              { name: "Cheesecake", desc: "", price: "$5.99", available: true }
            ]
          }
        ]
      };
    }
    renderMenu();
  });
}

function renderMenu() {
  var editor = document.getElementById('menu-editor');
  editor.innerHTML = '';
  MENU.sections.forEach(function(section, si) {
    var block = document.createElement('div');
    block.className = 'section-block';
    var itemsHtml = '';
    if (section.items.length === 0) {
      itemsHtml = '<div class="empty-section">Aucun plat — cliquez sur + Plat</div>';
    } else {
      section.items.forEach(function(item, ii) {
        itemsHtml += '<div class="item-row' + (item.available ? '' : ' unavailable') + '" id="row-' + si + '-' + ii + '">' +
          '<input class="field-input" value="' + esc(item.name) + '" placeholder="Nom du plat" oninput="MENU.sections[' + si + '].items[' + ii + '].name=this.value">' +
          '<input class="field-input" value="' + esc(item.desc) + '" placeholder="Description (optionnel)" oninput="MENU.sections[' + si + '].items[' + ii + '].desc=this.value">' +
          '<input class="price-input" value="' + esc(item.price) + '" placeholder="$0.00" oninput="MENU.sections[' + si + '].items[' + ii + '].price=this.value">' +
          '<div class="item-controls">' +
            '<label class="toggle" title="Disponible">' +
              '<input type="checkbox"' + (item.available ? ' checked' : '') + ' onchange="toggleItem(' + si + ',' + ii + ',this.checked)">' +
              '<div class="toggle-track"></div>' +
              '<div class="toggle-thumb"></div>' +
            '</label>' +
            '<button class="btn-del-item" onclick="deleteItem(' + si + ',' + ii + ')" title="Supprimer">✕</button>' +
          '</div>' +
        '</div>';
      });
    }
    block.innerHTML =
      '<div class="section-header">' +
        '<input class="section-name-input" value="' + esc(section.name) + '" oninput="MENU.sections[' + si + '].name=this.value">' +
        '<div class="section-actions">' +
          '<button class="btn-add-item" onclick="addItem(' + si + ')">+ Plat</button>' +
          '<button class="btn-del-section" onclick="deleteSection(' + si + ')">Supprimer</button>' +
        '</div>' +
      '</div>' +
      '<div class="items-list">' + itemsHtml + '</div>';
    editor.appendChild(block);
  });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function toggleItem(si, ii, val) {
  MENU.sections[si].items[ii].available = val;
  var row = document.getElementById('row-' + si + '-' + ii);
  if (row) row.className = 'item-row' + (val ? '' : ' unavailable');
}
function addItem(si) {
  MENU.sections[si].items.push({ name: "", desc: "", price: "", available: true });
  renderMenu();
}
function deleteItem(si, ii) {
  MENU.sections[si].items.splice(ii, 1);
  renderMenu();
}
function addSection() {
  MENU.sections.push({ name: "Nouvelle section", items: [] });
  renderMenu();
}
function deleteSection(si) {
  if (confirm('Supprimer cette section et tous ses plats ?')) {
    MENU.sections.splice(si, 1);
    renderMenu();
  }
}
function publishMenu() {
  db.collection('menus').doc(RESTO_ID).set(MENU).then(function() {
    var msg = document.getElementById('status-msg');
    msg.classList.add('show');
    setTimeout(function() { msg.classList.remove('show'); }, 3000);
  }).catch(function(e) {
    alert('Erreur : ' + e.message);
  });
}
</script>
</body>
</html>
